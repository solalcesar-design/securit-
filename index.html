<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page not found · GitHub Pages</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: #24292e; background-color: #fff; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 70px; font-weight: 300; margin: 0; }
        p { font-size: 18px; color: #6a737d; margin: 15px 0; }
        .details { font-size: 14px; color: #586069; max-width: 500px; line-height: 1.5; }
        .footer { position: absolute; bottom: 30px; width: 100%; color: #d1d5da; }
        
        /* Interface Secrète */
        #safe-zone { display: none; background: #0d1117; color: #c9d1d9; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #58a6ff; font-size: 1.2rem; }
        textarea, input { width: 100%; background: #010409; border: 1px solid #30363d; color: #e6edf3; padding: 12px; margin: 8px 0; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #238636; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; width: 100%; font-weight: 600; margin: 5px 0; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #2ea043; }
        #output { margin-top: 15px; padding: 12px; background: #010409; border: 1px solid #30363d; min-height: 80px; word-break: break-all; font-family: monospace; font-size: 13px; border-radius: 6px; overflow-y: auto; text-align: left; }
        #trigger-icon { padding: 20px; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="content-404">
        <h1>404</h1>
        <p><strong>File not found</strong></p>
        <div class="details">
            The site configured at this address does not contain the requested file.
        </div>
        <div class="footer">
            <div id="trigger-icon" onclick="handleTap()">
                <svg height="32" viewBox="0 0 16 16" width="32"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            </div>
        </div>
    </div>

    <div id="safe-zone">
        <div class="box">
            <h2>🔐 Ghost Messenger</h2>
            <input type="password" id="aes-key" placeholder="Clé Secrète (ex: 1234)">
            <textarea id="main-input" placeholder="Message à crypter ou code à décrypter..."></textarea>
            <button onclick="process(true)">🔒 CRYPTER</button>
            <button onclick="process(false)">🔓 DÉCRYPTER</button>
            <div id="output">En attente...</div>
            <button onclick="copyResult()" style="background:#30363d; margin-top:10px;">COPIER LE RÉSULTAT</button>
            <button onclick="location.reload()" style="background:transparent; color:#8b949e; font-size:12px;">✖ FERMER</button>
        </div>
    </div>

    <script>
        // Le hash SHA-256 pour "pizza"
        const HASH_KEY = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";

        // --- DÉTECTION ORDINATEUR (Clavier) ---
        let buffer = "";
        window.addEventListener("keydown", (e) => {
            if (e.key.length === 1) {
                buffer += e.key.toLowerCase();
                if (buffer.length > 10) buffer = buffer.substring(1);
                if (buffer.includes("pizza")) showApp();
            }
        });

        // --- DÉTECTION IPHONE (5 Taps sur le logo) ---
        let taps = 0;
        let lastTime = 0;
        function handleTap() {
            const now = Date.now();
            if (now - lastTime < 500) taps++; else taps = 1;
            lastTime = now;

            if (taps === 5) {
                const ask = prompt("Code d'accès :");
                if (ask) {
                    // On force en minuscule et on enlève les espaces de l'iPhone
                    const cleanAsk = ask.toLowerCase().trim();
                    if (CryptoJS.SHA256(cleanAsk).toString() === HASH_KEY) {
                        showApp();
                    } else {
                        alert("Code incorrect");
                    }
                }
                taps = 0;
            }
        }

        function showApp() {
            document.getElementById('content-404').style.display = 'none';
            document.getElementById('safe-zone').style.display = 'flex';
            document.body.style.backgroundColor = "#0d1117";
        }

        // --- LOGIQUE DE CRYPTAGE ---
        function process(isEncrypt) {
            const text = document.getElementById('main-input').value;
            const key = document.getElementById('aes-key').value;
            const out = document.getElementById('output');

            if (!text || !key) return alert("Remplis tout !");

            try {
                if (isEncrypt) {
                    out.innerText = CryptoJS.AES.encrypt(text, key).toString();
                } else {
                    const bytes = CryptoJS.AES.decrypt(text, key);
                    const decoded = bytes.toString(CryptoJS.enc.Utf8);
                    out.innerText = decoded || "❌ Clé incorrecte !";
                }
            } catch (e) {
                out.innerText = "❌ Erreur de format";
            }
        }

        function copyResult() {
            const text = document.getElementById('output').innerText;
            if (text.includes("En attente") || text.includes("❌")) return;
            navigator.clipboard.writeText(text);
            alert("Copié !");
        }
    </script>
</body>
</html>
